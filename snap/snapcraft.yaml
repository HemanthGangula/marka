name: marka
base: core24
version: '1.0.0'
summary: Lightweight GTK4 Markdown viewer and editor
description: |
  Marka is a lightweight, native Linux Markdown viewer and editor built
  with GTK4 and libadwaita. It renders Markdown in real time with GitHub-style
  typography, supports syntax-highlighted code blocks, and respects the system
  light/dark theme automatically.

  Features: live split-pane preview, GtkSourceView syntax highlighting,
  tables, task lists, footnotes, find-in-document, zoom, print, export to HTML,
  drag-and-drop, recent files.

grade: stable
confinement: strict

platforms:
  amd64:
  arm64:

apps:
  marka:
    command: bin/marka
    extensions: [gnome]
    plugs:
      - home
      - removable-media
    desktop: usr/share/applications/io.github.HemanthGangula.Marka.desktop
    environment:
      PYTHONPATH: $SNAP/lib/python3.12/site-packages:$SNAP/usr/lib/python3/dist-packages

parts:
  marka:
    plugin: python
    source: .
    python-requirements:
      - requirements.txt
    build-packages:
      - python3-dev
    stage-packages:
      - python3-gi
      - python3-gi-cairo
      - gir1.2-gtk-4.0
      - gir1.2-adw-1
      - gir1.2-webkit2gtk-6.0
      - gir1.2-gtksource-5
      - libgirepository-1.0-1
    override-build: |
      craftctl default
      install -Dm644 data/io.github.HemanthGangula.Marka.metainfo.xml \
        $SNAPCRAFT_PART_INSTALL/usr/share/metainfo/io.github.HemanthGangula.Marka.metainfo.xml
      install -Dm644 marka.desktop \
        $SNAPCRAFT_PART_INSTALL/usr/share/applications/io.github.HemanthGangula.Marka.desktop
      install -Dm644 data/icons/io.github.HemanthGangula.Marka.svg \
        $SNAPCRAFT_PART_INSTALL/usr/share/icons/hicolor/scalable/apps/io.github.HemanthGangula.Marka.svg
