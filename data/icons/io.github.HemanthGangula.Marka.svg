<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background rounded rectangle -->
  <rect x="4" y="4" width="56" height="56" rx="12" ry="12"
        fill="#3584e4" />
  <!-- Document body -->
  <rect x="14" y="10" width="36" height="44" rx="4" ry="4"
        fill="#ffffff" opacity="0.95"/>
  <!-- Text lines representing markdown content -->
  <!-- Heading line (bold/thick) -->
  <rect x="18" y="17" width="22" height="4" rx="2" fill="#1c71d8"/>
  <!-- Body lines -->
  <rect x="18" y="26" width="28" height="2.5" rx="1.25" fill="#9a9996"/>
  <rect x="18" y="31" width="24" height="2.5" rx="1.25" fill="#9a9996"/>
  <rect x="18" y="36" width="26" height="2.5" rx="1.25" fill="#9a9996"/>
  <!-- Hash symbol hint for markdown -->
  <text x="18" y="16" font-family="monospace" font-size="5"
        fill="#1c71d8" font-weight="bold">#</text>
  <!-- Code block hint -->
  <rect x="18" y="42" width="28" height="7" rx="2" fill="#deddda"/>
  <rect x="20" y="44" width="12" height="2" rx="1" fill="#77767b"/>
  <rect x="20" y="47" width="18" height="2" rx="1" fill="#77767b"/>
</svg>
